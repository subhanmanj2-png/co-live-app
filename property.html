<!DOCTYPE html>
<html lang="en" id="app-html" class="light">
<head>
    <meta charset="UTF-8">
    <title>Co-Live | Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="app.js"></script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 flex flex-col md:flex-row min-h-screen">
    
    <div id="sidebar-root"></div>

    <main class="flex-1 h-screen overflow-y-auto p-10 max-w-5xl mx-auto">
        <h1 class="text-5xl font-black mb-12 italic">Account</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="p-8 bg-white dark:bg-zinc-900 border dark:border-zinc-800 rounded-[35px] shadow-sm">
                <h3 class="text-2xl font-black mb-2">Personal Info</h3>
                <p class="opacity-50 text-sm mb-8 font-medium">Manage names, ID verification, and contact info.</p>
                <button class="font-bold text-indigo-600 hover:text-indigo-500">Edit Profile &rarr;</button>
            </div>
            
            <div class="p-8 bg-white dark:bg-zinc-900 border dark:border-zinc-800 rounded-[35px] shadow-sm">
                <h3 class="text-2xl font-black mb-2">Payments & Payouts</h3>
                <p class="opacity-50 text-sm mb-8 font-medium">Review rent history, security deposits, and split bills.</p>
                <a href="payments.html" class="font-bold text-indigo-600 hover:text-indigo-500">Manage Wallet &rarr;</a>
            </div>

            <div class="p-8 bg-white dark:bg-zinc-900 border dark:border-zinc-800 rounded-[35px] shadow-sm">
                <h3 class="text-2xl font-black mb-2">Trust & Verification</h3>
                <p class="opacity-50 text-sm mb-8 font-medium">Status: <span class="text-red-500 font-bold bg-red-100 dark:bg-red-900/30 px-2 py-1 rounded-md">Unverified</span></p>
                <button class="font-bold text-indigo-600 hover:text-indigo-500">Upload CNIC / ID &rarr;</button>
            </div>
        </div>
    </main>

</body>
</html>
